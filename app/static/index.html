<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcription</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --border: #2a2a30;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 2rem;
      letter-spacing: -0.02em;
    }
    .container {
      width: 100%;
      max-width: 560px;
    }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .tab {
      padding: 0.6rem 1.2rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text); border-color: var(--text); }
    .tab.active {
      background: var(--surface);
      color: var(--accent);
      border-color: var(--accent);
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
      margin-bottom: 1rem;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(34, 197, 94, 0.05);
    }
    .dropzone input { display: none; }
    .dropzone .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      opacity: 0.7;
    }
    .dropzone p { color: var(--muted); font-size: 0.95rem; }
    .url-input {
      width: 100%;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .url-input::placeholder { color: var(--muted); }
    .url-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .options {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .options label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .options select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.4rem 0.75rem;
      font-family: inherit;
    }
    .btn {
      width: 100%;
      padding: 1rem 1.5rem;
      background: var(--accent);
      color: #0f0f12;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }
    .result {
      margin-top: 2rem;
      padding: 1.5rem;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      display: none;
    }
    .result.visible { display: block; }
    .result h3 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }
    .result pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
    }
    .status {
      padding: 1rem;
      background: var(--surface);
      border-radius: 10px;
      margin-top: 1rem;
      display: none;
    }
    .status.visible { display: block; }
    .status.processing { border-left: 4px solid var(--accent); }
    .status.error { border-left: 4px solid var(--error); }
    .status p { font-size: 0.9rem; }
    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Transcription</h1>
    <div class="tabs">
      <button class="tab active" data-tab="file">Upload file</button>
      <button class="tab" data-tab="url">From URL</button>
    </div>

    <div id="panel-file" class="panel active">
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="audio/*,video/*,.mp4,.mp3,.wav,.m4a,.webm,.avi,.mov,.mkv,.flv,.m4v">
        <div class="icon">📁</div>
        <p>Drag & drop audio or video here, or click to browse</p>
      </div>
      <div class="options">
        <label>
          Language:
          <select id="langFile">
            <option value="ru">Russian</option>
            <option value="en">English</option>
            <option value="auto">Auto-detect</option>
          </select>
        </label>
      </div>
      <button class="btn" id="btnUpload" disabled>Transcribe</button>
    </div>

    <div id="panel-url" class="panel">
      <input type="url" class="url-input" id="urlInput" placeholder="https://example.com/audio.mp3 or video URL">
      <div class="options">
        <label>
          Language:
          <select id="langUrl">
            <option value="ru">Russian</option>
            <option value="en">English</option>
            <option value="auto">Auto-detect</option>
          </select>
        </label>
      </div>
      <button class="btn" id="btnUrl">Transcribe from URL</button>
    </div>

    <div class="status" id="status"></div>
    <div class="result" id="result">
      <h3>Transcription</h3>
      <pre id="resultText"></pre>
    </div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const btnUpload = document.getElementById('btnUpload');
    const langFile = document.getElementById('langFile');
    const urlInput = document.getElementById('urlInput');
    const btnUrl = document.getElementById('btnUrl');
    const langUrl = document.getElementById('langUrl');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const resultText = document.getElementById('resultText');

    let selectedFile = null;
    let pollTimer = null;

    const validExt = /\.(mp4|mp3|wav|m4a|webm|avi|mov|mkv|flv|m4v|ogg|aac)$/i;

    function isValidFile(f) {
      return f && (f.type.startsWith('audio/') || f.type.startsWith('video/') || validExt.test(f.name));
    }

    function selectFile(f) {
      if (!isValidFile(f)) return;
      selectedFile = f;
      btnUpload.disabled = false;
      dropzone.querySelector('p').textContent = f.name;
    }

    function showStatus(html, type) {
      statusEl.className = 'status visible' + (type ? ' ' + type : '');
      statusEl.innerHTML = html;
    }

    function hideStatus() {
      statusEl.className = 'status';
      statusEl.innerHTML = '';
    }

    function showResult(text) {
      resultText.textContent = text;
      resultEl.classList.add('visible');
    }

    function hideResult() {
      resultEl.classList.remove('visible');
      resultText.textContent = '';
    }

    function setBusy(busy) {
      btnUpload.disabled = busy || !selectedFile;
      btnUrl.disabled = busy;
    }

    async function pollJob(jobId) {
      if (pollTimer) clearInterval(pollTimer);

      async function check() {
        const statusRes = await fetch('/api/status/' + jobId);
        if (!statusRes.ok) {
          clearInterval(pollTimer);
          pollTimer = null;
          setBusy(false);
          showStatus('<p>Job not found.</p>', 'error');
          return;
        }

        const status = await statusRes.json();
        if (status.status === 'completed') {
          clearInterval(pollTimer);
          pollTimer = null;
          const resultRes = await fetch('/api/result/' + jobId);
          setBusy(false);
          if (!resultRes.ok) {
            const err = await resultRes.json().catch(() => ({}));
            showStatus('<p>' + (err.detail || 'Failed to load result') + '</p>', 'error');
            return;
          }
          const result = await resultRes.json();
          hideStatus();
          showResult(result.full_text || '(empty)');
          return;
        }

        if (status.status === 'failed') {
          clearInterval(pollTimer);
          pollTimer = null;
          setBusy(false);
          showStatus('<p>' + (status.error || 'Transcription failed') + '</p>', 'error');
          return;
        }

        const pos = status.position > 0 ? ' (queue position: ' + status.position + ')' : '';
        showStatus(
          '<span class="spinner"></span> ' + status.status + pos + '…',
          'processing'
        );
      }

      await check();
      pollTimer = setInterval(check, 2000);
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      selectFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
      selectFile(fileInput.files[0]);
      fileInput.value = '';
    });

    btnUpload.addEventListener('click', async () => {
      if (!selectedFile) return;
      hideResult();
      setBusy(true);
      showStatus('<span class="spinner"></span> Uploading…', 'processing');

      const form = new FormData();
      form.append('file', selectedFile);
      form.append('language', langFile.value);

      try {
        const res = await fetch('/api/transcribe/upload', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) {
          setBusy(false);
          showStatus('<p>' + (data.detail || 'Upload failed') + '</p>', 'error');
          return;
        }
        await pollJob(data.job_id);
      } catch (e) {
        setBusy(false);
        showStatus('<p>Network error: ' + e.message + '</p>', 'error');
      }
    });

    btnUrl.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      if (!url) {
        showStatus('<p>Please enter a URL.</p>', 'error');
        return;
      }
      hideResult();
      setBusy(true);
      showStatus('<span class="spinner"></span> Downloading audio…', 'processing');

      const form = new FormData();
      form.append('url', url);
      form.append('language', langUrl.value);

      try {
        const res = await fetch('/api/transcribe/url', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) {
          setBusy(false);
          showStatus('<p>' + (data.detail || 'Request failed') + '</p>', 'error');
          return;
        }
        await pollJob(data.job_id);
      } catch (e) {
        setBusy(false);
        showStatus('<p>Network error: ' + e.message + '</p>', 'error');
      }
    });
  </script>
</body>
</html>
